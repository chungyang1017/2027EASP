name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Stage site (serve at both / and /泳꿴쟻/)
        run: |
          mkdir -p _site/泳꿴쟻
          cp -R 泳꿴쟻/. _site/
          cp -R 泳꿴쟻/. _site/泳꿴쟻/
          rm -rf _site/泳꿴쟻/泳꿴쟻
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
